<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>덱빌딩 게임 프로토타입</title>
    <style>
/* 기본 설정 (모바일 최적화) */
        body { margin: 0; padding: 20px 10px; box-sizing: border-box; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        #game-container { width: 100%; height: 100%; max-width: 450px; background-color: #1a1a1a; position: relative; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .screen { display: none; flex-direction: column; width: 100%; height: 100%; position: absolute; top: 0; left: 0; padding: 15px; box-sizing: border-box; background-color: #1a1a1a; z-index: 1; }
        .screen.active { display: flex; }
        
        button { background-color: #333; color: #fff; border: 2px solid #555; padding: 12px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:active { background-color: #111; transform: scale(0.95); }
        
        /* --- 전투 UI --- */
        .info-box { padding: 10px; border: 1px solid #444; border-radius: 8px; background-color: #222; text-align: center; margin-bottom: 10px; font-size: 1.1rem; }
        #script-box { flex-grow: 1; border: 1px solid #333; padding: 10px; overflow-y: auto; font-size: 1rem; line-height: 1.5; background-color: #111; margin-bottom: 10px; border-radius: 8px; }
        #script-box div { margin-bottom: 5px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 하단 액션 영역 (무덤 - 손패 - 덱) */
        .bottom-action-area { display: flex; justify-content: space-between; align-items: center; height: 110px; width: 100%; margin-bottom: 5px; }
        .hand-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; gap: 8px; height: 100%; }
        .deck-btn { width: 55px; height: 55px; padding: 5px; font-size: 0.85rem; border-radius: 8px; background-color: #222; border: 2px solid #555; display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.3; flex-shrink: 0; }
        .deck-grave-ui button { padding: 8px 15px; font-size: 0.9rem; }

        /* --- 카드 UI --- */
        .card-mini { 
            flex: 1 1 0; /* 카드가 많아지면 동일한 비율로 줄어들게 설정 */
            min-width: 0; /* ★핵심: 텍스트 길이에 영향받지 않고 일정하게 축소되도록 강제 */
            max-width: 75px; 
            aspect-ratio: 3/4; 
            border: 2px solid #fff; 
            border-radius: 6px; 
            background-color: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            font-size: 0.85rem; 
            font-weight: bold; 
            cursor: pointer; 
            word-break: keep-all; 
            padding: 3px; 
            box-sizing: border-box; 
            overflow: hidden; /* ★핵심: 글자가 박스 밖으로 삐져나가는 것을 숨김 */
            line-height: 1.2;
        }
        .card-mini:active { transform: scale(0.9); }
        
        /* 드로우 / 선택용 디테일 카드 */
        .card-detail { width: 90%; max-width: 300px; border: 2px solid #fff; border-radius: 12px; background-color: #222; padding: 15px; margin-bottom: 10px; cursor: pointer; text-align: left; }
        .card-detail:active { transform: scale(0.98); }
        .card-detail .name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .card-detail .desc { font-size: 0.9rem; color: #ccc; }
        
        /* 태그 색상 */
        .tag-atk { border-color: #ff4d4d !important; color: #ff4d4d; }
        .tag-util { border-color: #4da6ff !important; color: #4da6ff; }
        .tag-buff { border-color: #ffcc00 !important; color: #ffcc00; }
        .tag-elite { border-color: #cc33ff !important; color: #cc33ff; }

        .bg-atk { border-color: #ff4d4d !important; }
        .bg-util { border-color: #4da6ff !important; }
        .bg-buff { border-color: #ffcc00 !important; }
        .bg-elite { border-color: #cc33ff !important; }

        /* --- 모달 (드로우, 덱, 무덤) --- */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal.active { display: flex; }
        .modal h3 { color: #fff; margin-bottom: 20px; text-align: center; }
        
        /* 모달 내부 그리드 (덱, 무덤 목록) */
        .modal-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: flex-start; /* 카드가 적을 때 무조건 왼쪽 위부터 차례대로 채움 */
            width: 100%; 
            max-width: 360px; /* 전체 카드 영역 너비 제한 */
            margin-bottom: 20px; 
        }

        /* 덱/무덤 창의 카드는 손패의 가변 크기 설정을 무시하고 고정 크기 사용 */
        .modal-grid .card-mini {
            flex: 0 0 auto; 
            max-width: none; 
            box-sizing: border-box; 
        }

        /* 1~6번째 카드 (1번째 줄 3장, 2번째 줄 3장) */
        .modal-grid .card-mini:nth-child(-n+6) {
            width: calc((100% - 20px) / 3); /* 여백(10px) 2개를 제외한 공간을 정확히 3등분 */
        }

        /* 7~10번째 카드 (3번째 줄 4장) */
        .modal-grid .card-mini:nth-child(n+7) {
            width: calc((100% - 30px) / 4); /* 여백 3개를 제외한 공간을 정확히 4등분 */
            font-size: 0.75rem; /* 4장이 들어가야 하므로 텍스트를 약간 축소 */
            padding: 2px;
        }

        
        /* --- 연출 및 이펙트 --- */
        .hit-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; z-index: 50; }
        
        /* 물리피해 플래시 */
        .flash-white { background-color: rgba(255, 255, 255, 0.8); animation: flash 0.3s ease-out; }
        
        /* 상태이상 침식 연출 (테두리 및 전체화면) */
        .tint-green { box-shadow: inset 0 0 100px 30px rgba(0, 255, 0, 0.6); animation: flash 0.6s ease-out; }
        .tint-red { box-shadow: inset 0 0 100px 30px rgba(255, 0, 0, 0.6); animation: flash 0.6s ease-out; }
        .tint-purple { box-shadow: inset 0 0 100px 30px rgba(200, 0, 255, 0.6); animation: flash 0.6s ease-out; }
        .tint-white { box-shadow: inset 0 0 100px 30px rgba(255, 255, 255, 0.8); animation: flash 0.6s ease-out; } 
        
        @keyframes flash { 0% { opacity: 0.8; } 100% { opacity: 0; } }
        
        /* 흔들림 연출 (1타 및 2타) */
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 75% { transform: translate(-5px, -5px); } }
        .anim-shake { animation: shake 0.3s ease-in-out; }
        
        @keyframes shake-double { 0%, 100% { transform: translate(0, 0); } 12% { transform: translate(-5px, 5px); } 25% { transform: translate(5px, -5px); } 37% { transform: translate(-5px, -5px); } 50% { transform: translate(0, 0); } 62% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } 87% { transform: translate(-5px, -5px); } }
        .anim-shake-double { animation: shake-double 0.4s ease-in-out; }

        /* 토끼기사 연출용 CSS */
        .glitch-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; font-style: italic; color: #fff; z-index: 200; text-shadow: 4px 0 #ff00ff, -4px 0 #00ffff; animation: glitch-anim 0.1s infinite; pointer-events: none; letter-spacing: 2px; }
        @keyframes glitch-anim { 0% { transform: translate(-50%, -50%) skew(0deg); } 20% { transform: translate(-52%, -50%) skew(-10deg); } 40% { transform: translate(-48%, -50%) skew(10deg); } 60% { transform: translate(-50%, -52%) skew(0deg); } 80% { transform: translate(-50%, -48%) skew(0deg); } 100% { transform: translate(-50%, -50%) skew(0deg); } }
        .flying-card { position: absolute; z-index: 150; width: 60px; height: 80px; background: #222; border: 2px solid #cc33ff; border-radius: 6px; color: #cc33ff; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: bold; pointer-events: none; text-align: center; box-shadow: 0 0 20px rgba(204,51,255,0.8); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="fx-layer" class="hit-effect"></div>

    <div id="screen-start" class="screen active" style="justify-content: center; align-items: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 50px;">덱빌딩<br>beta-0.25</h1>
        <button id="btn-start">게임 시작</button>
    </div>

    <div id="screen-intro" class="screen" style="justify-content: center; text-align: center;">
        <div id="intro-text" style="font-size: 1.2rem; line-height: 1.8; flex-grow: 1; display: flex; align-items: center; justify-content: center;"></div>
        <button id="btn-intro-next" style="display: none; margin-top: auto;">전투 진입</button>
    </div>

    <div id="screen-battle" class="screen">
        <div id="enemy-info" class="info-box">적 정보</div>
        <div id="script-box"></div>
        
        <div id="player-info" class="info-box" style="background-color: #1a2a3a; border-color: #4da6ff;">HP: 150 | AP: 0 | 방어: 0</div>
        
        <div class="bottom-action-area">
            <button id="btn-grave" class="deck-btn">무덤<br>(0)</button>
            <div id="hand-box" class="hand-area"></div>
            <button id="btn-deck" class="deck-btn">덱<br>(10)</button>
        </div>
    </div>

    <div id="screen-reward" class="screen" style="align-items: center;">
        <h3 id="reward-title">전투 승리! 카드를 1장 선택하세요.</h3>
        <div id="reward-list" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <div id="screen-gameover" class="screen" style="justify-content: center; align-items: center;">
        <h1 style="color: #ff4d4d; margin-bottom: 20px;">눈앞이 깜깜해졌다.</h1>
        <h2 id="final-score" style="margin-bottom: 50px;">격파한 적: 0명</h2>
        <button id="btn-restart">다시 시작</button>
    </div>

    <div id="screen-starter" class="screen" style="align-items: center; justify-content: center;">
        <h2 style="margin-bottom: 30px;">시작 덱 컨셉을 선택하세요</h2>
        <div style="display: flex; flex-direction: column; gap: 20px; width: 80%;">
            <button onclick="game.selectStarter('연격')">연격 덱 (관련 카드 3장)</button>
            <button onclick="game.selectStarter('상태이상')">상태이상 덱 (관련 카드 3장)</button>
            <button onclick="game.selectStarter('반격')">반격 덱 (관련 카드 3장)</button>
        </div>
    </div>

    <div id="screen-intermission" class="screen" style="align-items: center; justify-content: center;">
        <h2 style="color: #4da6ff; margin-bottom: 20px;">전투 준비 완료</h2>
        <div class="info-box" style="width: 80%; text-align: left; margin-bottom: 20px; background-color: #1a1a1a;">
            <p>🏆 <b>현재 격파 수:</b> <span id="inter-score" style="color: #ffcc00; font-size: 1.2rem;">0</span>명</p>
            <hr style="border-color: #333;">
            <p style="color: #aaa;">💀 <b>직전 격파:</b><br><span id="inter-last-enemy" style="color: #fff;">없음</span></p>
            <p style="color: #ff4d4d; font-size: 1.1rem; margin-top: 15px;">⚔️ <b>다음 적:</b><br><span id="inter-next-enemy" style="color: #fff;">미정</span></p>
        </div>
        <button id="btn-inter-next" style="width: 80%; padding: 15px; font-weight: bold;">다음 전투 진입</button>
    </div>

    <div id="modal-draw" class="modal">
        <h3>덱에서 1장을 선택하여 손패로 가져오고, 나머지 2장은 다시 덱에 넣습니다.</h3>
        <div id="draw-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="modal-view" class="modal">
        <h3 id="view-title">목록</h3>
        <div id="view-list" class="modal-grid"></div>
        <button onclick="document.getElementById('modal-view').classList.remove('active')" style="margin-top: 20px; width: 80%;">닫기</button>
    </div>
</div>

<div id="modal-play" class="modal" onclick="document.getElementById('modal-play').classList.remove('active')">
        <h3 style="margin-top: 20vh;">이 카드를 사용할까요?<br><span style="font-size: 0.8rem; color: #aaa;">(바탕 터치 시 취소)</span></h3>
        <div id="play-card-container" style="display: flex; justify-content: center; width: 100%;"></div>
    </div>

<script>
// ============================================================================
// 1. 데이터베이스 및 전역 유틸
// ============================================================================
const CARD_DB = [
    { id: "b1", category: "기본", name: "일반 공격", desc: "적에게 물리피해 10", tags: ["공격"] },
    { id: "b2", category: "기본", name: "일반 방어", desc: "자신에게 물리피해 방어도 8", tags: ["버프"] },
    { id: "b3", category: "기본", name: "숨고르기", desc: "효과 없음", tags: ["유틸리티"] },
    
    { id: "c1", category: "연격", name: "연속 베기", desc: "적에게 물리피해 15x2", tags: ["공격"] },
    { id: "c2", category: "연격", name: "연속 찌르기", desc: "적에게 물리피해 14x2", tags: ["공격"] },
    { id: "c3", category: "연격", name: "연속 때리기", desc: "적에게 물리피해 16x2", tags: ["공격"] },
    { id: "c4", category: "연격", name: "스텝 밟기", desc: "자신 2장 드로우, 자신 AP 3 회복", tags: ["유틸리티"] },
    { id: "c5", category: "연격", name: "전술적 구르기", desc: "자신 1장 드로우, 자신 AP 3 회복", tags: ["유틸리티"] },
    { id: "c6", category: "연격", name: "감각 개화", desc: "자신 1장 드로우, 자신 AP 3 회복", tags: ["유틸리티"] },
    { id: "c7", category: "연격", name: "기사의 신조", desc: "자신이 보유한 상태이상 중 1개를 랜덤으로 제거한다.", tags: ["버프"] },
    { id: "c8", category: "연격", name: "선견지명", desc: "자신의 덱에서 '스텝 밟기' 1장을 찾아 드로우, 자신 AP 4 회복.", tags: ["유틸리티"] },
    { id: "c9", category: "연격", name: "토끼기사의 지혜", desc: "드로우 시 무덤으로 가며 1장을 대신 드로우한다. 무덤으로 갈 때 적에게 물리피해 17. 사용 시 효과 없음.", tags: ["공격", "유틸리티"] },
    { id: "c10", category: "연격", name: "구사일생", desc: "자신이 구축한 10장의 덱 풀에 존재하는 물리피해 공격 카드의 위력을 합산하여 물리피해로 입힌다.", tags: ["공격", "엘리트", "유틸리티"] },

    { id: "s1", category: "상태이상", name: "중독", desc: "적에게 중독 3 부여. (매턴 종료시 스택당 8의 피해 후 스택 1 감소)", tags: ["공격"] },
    { id: "s2", category: "상태이상", name: "화상", desc: "적에게 화상 4 부여. (매턴 종료시 스택당 6의 피해 후 스택 1 감소)", tags: ["공격"] },
    { id: "s3", category: "상태이상", name: "저주", desc: "적에게 저주 7 부여. (매턴 종료시 스택당 3의 피해 후 스택 1 감소)", tags: ["공격"] },
    { id: "s4", category: "상태이상", name: "흡혈", desc: "적에게 물리피해 15, 자신에게 HP회복 11", tags: ["공격", "버프"] },
    { id: "s5", category: "상태이상", name: "이행", desc: "적이 보유한 상태이상 중 1개를 랜덤으로 '결산'하여 물리피해로 입힌다.", tags: ["공격"] },
    { id: "s6", category: "상태이상", name: "결산", desc: "적이 보유한 상태이상 전부를 '결산'하여 물리피해로 입힌다.", tags: ["공격", "엘리트"] },
    { id: "s7", category: "상태이상", name: "거미줄을 딛고", desc: "자신이 4턴 동안 '인내' 상태에 돌입함. (피해를 누적하여 나중에 상태이상 피해로 입음)", tags: ["버프"] },
    { id: "s8", category: "상태이상", name: "부채계약", desc: "2턴 동안 모두의 상태이상 스택이 감소하지 않는다.", tags: ["유틸리티"] },
    { id: "s9", category: "상태이상", name: "실명", desc: "2턴 동안 모두가 모든 피해에 면역된다.", tags: ["버프"] },
    { id: "s10", category: "상태이상", name: "절체절명", desc: "모두의 상태이상을 결산한 뒤 제거하고, 양측의 HP를 최대치까지 회복시킨다.", tags: ["버프"] },

    { id: "r1", category: "반격", name: "가시갑옷", desc: "3턴 동안 자신이 받는 물리피해를 50% 감소시키고, 막은 만큼 반사한다. (중첩 시 턴 추가)", tags: ["버프"] },
    { id: "r2", category: "반격", name: "고요한 밤", desc: "3턴 동안 자신이 받는 상태이상 피해를 50% 감소시키고, 막은 만큼 반사한다. (중첩 시 턴 추가)", tags: ["버프"] },
    { id: "r3", category: "반격", name: "단단함", desc: "자신에게 방어도 2 증가. (보유효과: 소지 시 최대 HP 40 증가)", tags: ["버프"] },
    { id: "r4", category: "반격", name: "튼튼함", desc: "자신에게 방어도 2 증가. (보유효과: 소지 시 최대 HP 45 증가)", tags: ["버프"] },
    { id: "r5", category: "반격", name: "둔감함", desc: "자신에게 방어도 2 증가. (보유효과: 소지 시 최대 HP 30 증가)", tags: ["버프"] },
    { id: "r6", category: "반격", name: "미련함", desc: "자신에게 방어도 2 증가. (보유효과: 소지 시 최대 HP 35 증가)", tags: ["버프"] },
    { id: "r7", category: "반격", name: "깨달음", desc: "덱에 없는 엘리트 제외 '공격' 카드를 무작위로 1장 시전한다.", tags: ["공격", "유틸리티"] },
    { id: "r8", category: "반격", name: "호기심", desc: "덱에 없는 엘리트 제외 '유틸리티' 카드를 무작위로 1장 시전한다.", tags: ["유틸리티"] },
    { id: "r9", category: "반격", name: "성급한 결정", desc: "모든 카드 중 하나를 무작위로 시전한다.", tags: ["유틸리티", "엘리트"] },
    { id: "r10", category: "반격", name: "만류귀종", desc: "적에게 최후통첩 1 부여. 매턴 종료 시 선고 데미지를 상태이상으로 입힌다.", tags: ["공격", "엘리트"] },

    { id: "e1", category: "적", name: "물어뜯기", desc: "적에게 물리피해 27.", tags: ["공격"] },
    { id: "e2", category: "적", name: "웅크리기", desc: "자신에게 물리피해 방어도 13.", tags: ["버프"] },
    { id: "e3", category: "적", name: "주변 맴돌기", desc: "자신 1장 드로우, 자신 AP 3 회복", tags: ["유틸리티"] }
];

const ENEMY_POOL = [
    { name: "전술 샌드백", hp: 110, deck: ["물어뜯기", "물어뜯기", "웅크리기", "주변 맴돌기", "주변 맴돌기"] },
    { name: "떠돌이 늑대", hp: 100, deck: ["물어뜯기", "물어뜯기", "물어뜯기", "주변 맴돌기"] },
    { name: "오염된 고블린", hp: 140, deck: ["물어뜯기", "웅크리기", "웅크리기", "주변 맴돌기"] }
];

const getCard = name => ({ ...CARD_DB.find(c => c.name === name) }); 
const sleep = ms => new Promise(r => setTimeout(r, ms));

// --- 신규: 랜덤 적 생성기 (스코어 스케일링 포함) ---
const generateRandomEnemy = (score = 0) => {
    const prefixes = ["오염된", "강인한", "오만한", "상냥한"];
    const names = ["트롤", "전사", "가로등지기", "기사"];
    let fullName = `${prefixes[Math.floor(Math.random() * prefixes.length)]} ${names[Math.floor(Math.random() * names.length)]}`;

    let tags = ["연격", "상태이상", "반격"];
    let primaryTag = tags[Math.floor(Math.random() * tags.length)];

    let deck = [];
    let primaryCards = CARD_DB.filter(c => c.category === primaryTag);
    deck.push(primaryCards[Math.floor(Math.random() * primaryCards.length)].name);
    deck.push(primaryCards[Math.floor(Math.random() * primaryCards.length)].name);

    let validCards = CARD_DB.filter(c => !c.tags.includes("엘리트") && c.category !== "기본");
    for(let i=0; i<5; i++) {
        deck.push(validCards[Math.floor(Math.random() * validCards.length)].name);
    }

    let baseHp = Math.floor(Math.random() * 61) + 100; // 100 ~ 160
    // 5명당 랜덤생성 적 HP 10% 복리 증가
    let scaleMultiplier = Math.pow(1.1, Math.floor(score / 5));
    let scaledHp = Math.floor(baseHp * scaleMultiplier);

    return { name: fullName, hp: scaledHp, deck: deck };
};

// ============================================================================
// 2. 코어 시스템
// ============================================================================
class Game {
    constructor() {
        this.score = 0;
        this.playerDeck = [];
        this.lastEnemyData = null; // 인터미션용 직전 적 정보
        this.nextEnemyData = null; // 인터미션용 다음 적 정보
        this.initDOM();
    }

    initDOM() {
        this.screens = {
            start: document.getElementById('screen-start'),
            intro: document.getElementById('screen-intro'),
            starter: document.getElementById('screen-starter'),     // 신규
            intermission: document.getElementById('screen-intermission'), // 신규
            battle: document.getElementById('screen-battle'),
            reward: document.getElementById('screen-reward'),
            gameover: document.getElementById('screen-gameover')
        };
        
        document.getElementById('btn-start').onclick = () => this.showIntro();
        document.getElementById('btn-intro-next').onclick = () => this.changeScreen('starter'); // 시작 덱 선택으로 이동
        document.getElementById('btn-inter-next').onclick = () => this.startBattle(); // 인터미션에서 전투로
        document.getElementById('btn-restart').onclick = () => this.changeScreen('start');

        document.getElementById('btn-deck').onclick = () => this.showListModal('덱 목록', this.player.deck);
        document.getElementById('btn-grave').onclick = () => this.showListModal('무덤 목록', this.player.grave);
    }

    changeScreen(name) {
        for (let key in this.screens) {
            if (this.screens[key]) {
                this.screens[key].classList.remove('active');
            }
        }
        if (this.screens[name]) {
            this.screens[name].classList.add('active');
        }
    }

    async showIntro() {
        this.changeScreen('intro');
        const textEl = document.getElementById('intro-text');
        const btn = document.getElementById('btn-intro-next');
        textEl.innerHTML = ""; 
        btn.style.display = "none";
        
        const introText = "덱빌딩의 세계에 오신 것을 환영합니다.<br><br>당신은 10장의 카드를 갖습니다.<br>매 턴마다 AP 2를 얻고 카드를 사용하세요.<br>전투에서 승리하면 새로운 카드를 얻고,<br>기존 카드를 버려 덱을 압축할 수 있습니다.<br><br>과연 몇 명의 적을 쓰러뜨릴 수 있을까요?";
        
        let currentHTML = "";
        for(let i=0; i<introText.length; i++) {
            if(introText[i] === '<') { 
                currentHTML += "<br>"; 
                i += 3; 
            } else { 
                currentHTML += introText[i]; 
            }
            textEl.innerHTML = currentHTML;
            await sleep(3); // 연출 스킵 원하면 0
        }
        btn.style.display = "block";
    }

    // --- 신규: 시작 덱 선택 및 다음 적 미리 준비 ---
    selectStarter(tag) {
        this.score = 0;
        
        // 고정 7장
        const baseNames = ["일반 공격", "일반 방어", "숨고르기", "숨고르기", "스텝 밟기", "토끼기사의 지혜", "호기심"];
        this.playerDeck = baseNames.map(getCard);
        
        // 선택 태그 카드 3장 랜덤 추가
        let tagCards = CARD_DB.filter(c => c.category === tag);
        for(let i=0; i<3; i++) {
            this.playerDeck.push(getCard(tagCards[Math.floor(Math.random() * tagCards.length)].name));
        }

        this.lastEnemyData = null; // 첫 전투이므로 직전 적은 없음
        this.prepareNextEnemy();   // 다음 적 생성
        this.startBattle();        // 첫 전투는 흐름상 덱 선택 후 바로 진입
    }

    prepareNextEnemy() {
        // 50:50 확률로 고정 몹 풀 또는 랜덤 스케일링 몹 생성
        if (Math.random() > 0.5) {
            this.nextEnemyData = ENEMY_POOL[Math.floor(Math.random() * ENEMY_POOL.length)];
        } else {
            this.nextEnemyData = generateRandomEnemy(this.score); 
        }
    }

    // --- 신규: 인터미션 화면 갱신 ---
    showIntermission() {
        this.changeScreen('intermission');
        this.prepareNextEnemy();
        
        document.getElementById('inter-score').innerText = this.score;
        
        if (this.lastEnemyData) {
            document.getElementById('inter-last-enemy').innerHTML = `${this.lastEnemyData.name}<br><span style="font-size: 0.9rem;">(최대 HP: ${this.lastEnemyData.maxHp})</span>`;
        }
        
        let nextBonus = this.calcBonusHp(this.nextEnemyData.deck);
        let nextMaxHp = this.nextEnemyData.hp + nextBonus;
        document.getElementById('inter-next-enemy').innerHTML = `${this.nextEnemyData.name}<br><span style="font-size: 0.9rem;">(최대 HP: ${nextMaxHp})</span>`;
    }

    calcSettlement(type, stack) {
        if (stack <= 0) return 0;
        let mult = type === 'poison' ? 8 : type === 'burn' ? 6 : 3;
        return (stack * (stack + 1) / 2) * mult; 
    }

    calcBonusHp(deckArray) {
        let bonus = 0;
        deckArray.forEach(c => {
            let name = typeof c === 'string' ? c : c.name;
            if (name === '단단함') bonus += 40; if (name === '튼튼함') bonus += 45;
            if (name === '둔감함') bonus += 30; if (name === '미련함') bonus += 35;
        });
        return bonus;
    }

    // ========================================================================
    // 3. 전투 시스템
    // ========================================================================
    async startBattle() {
        this.changeScreen('battle');
        this.scriptBox = document.getElementById('script-box');
        this.scriptBox.innerHTML = '';
        
        let pBonusHp = this.calcBonusHp(this.playerDeck);
        let pMaxHp = 150 + pBonusHp;
        this.player = { name: "플레이어", hp: pMaxHp, maxHp: pMaxHp, ap: 0, defense: 0, statuses: { poison: 0, burn: 0, curse: 0, patience_turns: 0, patience_val: 0, thorn_armor: 0, silent_night: 0, ultimatum: 0 }, deck: [...this.playerDeck].sort(()=>0.5-Math.random()), hand: [], grave: [] };
        
        // 생성된 nextEnemyData 사용
        let eBonusHp = this.calcBonusHp(this.nextEnemyData.deck);
        let eMaxHp = this.nextEnemyData.hp + eBonusHp;
        
        this.enemy = { name: this.nextEnemyData.name, hp: eMaxHp, maxHp: eMaxHp, ap: 0, defense: 0, statuses: { poison: 0, burn: 0, curse: 0, patience_turns: 0, patience_val: 0, thorn_armor: 0, silent_night: 0, ultimatum: 0 }, deck: this.nextEnemyData.deck.map(getCard).sort(()=>0.5-Math.random()), hand: [], grave: [] };

        this.globalStatus = { blindness: 0, debt_contract: 0 };
        this.isEndingTurn = false; // ✨ 신규 추가: 턴 종료 중복 방지용 깃발

        this.updateBattleUI();
        this.log(`야생의 [${this.enemy.name}]이(가) 나타났다!`);
        if (eBonusHp > 0) this.log(`(적의 패시브 효과로 HP가 ${eBonusHp} 증가했습니다.)`);
        if (pBonusHp > 0) this.log(`(당신의 패시브 효과로 HP가 ${pBonusHp} 증가했습니다.)`);
        
        await sleep(1000);

        await this.drawCard(this.player, 1);
        await this.drawCard(this.enemy, 1);
        this.updateBattleUI();

        this.turn = Math.random() < 0.5 ? 'player' : 'enemy';
        this.log(this.turn === 'player' ? "플레이어 선공!" : "적 선공!");
        await sleep(1000);

        this.runTurn();
    }

    log(msg) {
        this.scriptBox.innerHTML += `<div>${msg}</div>`;
        this.scriptBox.scrollTop = this.scriptBox.scrollHeight;
    }

    async triggerGraveEffect(entity, card) {
        if (card.name === "토끼기사의 지혜") {
            const fxContainer = document.getElementById('game-container');
            const glitch = document.createElement('div');
            glitch.className = 'glitch-text'; glitch.innerText = 'Rabbit';
            fxContainer.appendChild(glitch); await sleep(1000); glitch.remove();

            const flyCard = document.createElement('div');
            flyCard.className = 'flying-card'; flyCard.innerHTML = 'Rabbit<br>Knight';
            fxContainer.appendChild(flyCard);

            const handBox = document.getElementById('hand-box').getBoundingClientRect();
            const enemyBox = document.getElementById('enemy-info').getBoundingClientRect();
            const graveBtn = document.getElementById('btn-grave').getBoundingClientRect();
            const containerRect = fxContainer.getBoundingClientRect();

            flyCard.style.left = (handBox.left + handBox.width/2 - containerRect.left - 30) + 'px';
            flyCard.style.top = (handBox.top - containerRect.top - 40) + 'px';
            flyCard.style.transition = 'all 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            await sleep(50);

            flyCard.style.left = (enemyBox.left + enemyBox.width/2 - containerRect.left - 30) + 'px';
            flyCard.style.top = (enemyBox.top + enemyBox.height/2 - containerRect.top - 40) + 'px';
            flyCard.style.transform = 'scale(1.5) rotate(15deg)';
            await sleep(300); 
            
            let target = entity === this.player ? this.enemy : this.player;
            await this.dealDamage(target, 17, 'physical');
            if (this.checkEndGame()) { flyCard.remove(); return; }

            flyCard.style.left = (graveBtn.left + graveBtn.width/2 - containerRect.left - 30) + 'px';
            flyCard.style.top = (graveBtn.top + graveBtn.height/2 - containerRect.top - 40) + 'px';
            flyCard.style.transform = 'scale(0.3) rotate(360deg)';
            flyCard.style.opacity = '0';
            await sleep(300); flyCard.remove();
        }
    }

    async drawCard(entity, count) {
        let loopSafety = 0; 
        for(let i=0; i<count; i++) {
            loopSafety++;
            if (loopSafety > 30) break;

            if(entity.deck.length === 0) {
                if(entity.grave.length === 0) break;
                entity.deck = [...entity.grave].sort(()=>0.5-Math.random());
                entity.grave = [];
                if(entity === this.player) this.log("[시스템] 무덤을 덱으로 섞었습니다.");
            }
            const card = entity.deck.pop();
            
            if (card.name === "토끼기사의 지혜") {
                this.log(` 🐇 [토끼기사의 지혜]가 드로우되어 즉시 무덤으로 갑니다.`);
                entity.grave.push(card);
                await this.triggerGraveEffect(entity, card);
                if (this.checkEndGame()) return; 
                i--; 
                continue;
            }
            entity.hand.push(card);
        }
    }

    async runTurn() {            
        this.isEndingTurn = false; // ✨ 신규 추가: 턴이 새로 시작되면 잠금 해제

        if(this.turn === 'player') {
            this.player.ap = 2; 
            this.log(`<hr><b style="color:#4da6ff">--- 플레이어 턴 (AP:2) ---</b>`);
            this.updateBattleUI();
            await sleep(500);

            let drawPool = [];
            for(let i=0; i<3; i++) {
                if(this.player.deck.length === 0 && this.player.grave.length > 0) {
                    this.player.deck = [...this.player.grave].sort(()=>0.5-Math.random());
                    this.player.grave = [];
                }
                if(this.player.deck.length > 0) drawPool.push(this.player.deck.pop());
            }

            if(drawPool.length > 0) {
                const picked = await this.openDrawModalAsync(drawPool);
                if (picked.name === "토끼기사의 지혜") {
                    this.log(` 🐇 [토끼기사의 지혜] 선택! (즉시 무덤행)`);
                    this.player.grave.push(picked);
                    drawPool.forEach(c => { if(c !== picked) this.player.deck.push(c); }); 
                    await this.triggerGraveEffect(this.player, picked);
                    if (this.checkEndGame()) return;
                    await this.drawCard(this.player, 1);
                } else {
                    this.player.hand.push(picked);
                    drawPool.forEach(c => { if(c !== picked) this.player.deck.push(c); });
                    this.log(`[${picked.name}] 드로우.`);
                }
            }
            
            this.updateBattleUI();
            this.checkPlayable();

        } else {
            this.enemy.ap = 2; 
            this.log(`<hr><b style="color:#ff4d4d">--- ${this.enemy.name} 턴 (AP:2) ---</b>`);
            await sleep(800);

            let drawPool = [];
            for(let i=0; i<2; i++) {
                if(this.enemy.deck.length === 0 && this.enemy.grave.length > 0) {
                    this.enemy.deck = [...this.enemy.grave].sort(()=>0.5-Math.random());
                    this.enemy.grave = [];
                }
                if(this.enemy.deck.length > 0) drawPool.push(this.enemy.deck.pop());
            }
            if(drawPool.length > 0) {
                const picked = drawPool[Math.floor(Math.random() * drawPool.length)];
                if (picked.name === "토끼기사의 지혜") {
                    this.enemy.grave.push(picked);
                    drawPool.forEach(c => { if(c !== picked) this.enemy.deck.push(c); });
                    await this.triggerGraveEffect(this.enemy, picked);
                    if (this.checkEndGame()) return;
                    await this.drawCard(this.enemy, 1);
                } else {
                    this.enemy.hand.push(picked);
                    drawPool.forEach(c => { if(c !== picked) this.enemy.deck.push(c); });
                }
            }

            await this.enemyAI();
        }
    }

        checkPlayable() {
        // ✨ 수정: 내 턴이 아니거나, 이미 턴 종료 진행 중이면 무시
        if(this.turn !== 'player' || this.isEndingTurn) return; 
        
        if(this.player.ap < 2 || this.player.hand.length === 0) {
            this.isEndingTurn = true; // ✨ 신규 추가: 턴 종료 절차에 돌입했음을 표시 (자물쇠 걸기)
            this.log("카드를 낼 수 없어 턴을 종료합니다.");
            setTimeout(() => this.endTurn(), 1000);
        }
    }

    confirmPlayCard(card, index) {
        if(this.turn !== 'player' || this.isEndingTurn) return; 
        if(this.player.ap < 2) {
            this.log("AP가 부족합니다.");
            this.playShakeOnly(); 
            return;
        }

        const modal = document.getElementById('modal-play');
        const container = document.getElementById('play-card-container');
        container.innerHTML = '';

        let el = document.createElement('div');
        el.className = `card-detail ${this.getBgClass(card.tags)}`;
        el.innerHTML = `<div class="name">${card.name} <span style="font-size:0.7rem; font-weight:normal;">${card.tags.map(t=>'#'+t).join(' ')}</span></div><div class="desc">${card.desc}</div>`;
        
        el.onclick = async (e) => {
            e.stopPropagation(); 
            modal.classList.remove('active');
            await this.playCard(index);
        };

        container.appendChild(el);
        modal.classList.add('active');
    }

    async playCard(index) {
        if(this.turn !== 'player' || this.player.ap < 2) return;
        const card = this.player.hand.splice(index, 1)[0];
        this.player.ap -= 2;
        
        this.log(`👉 <b>[${card.name}]</b> 사용!`);
        await this.executeCard(card, this.player, this.enemy);
        
        this.player.grave.push(card);
        await this.triggerGraveEffect(this.player, card); 
        
        this.updateBattleUI();
        if(this.checkEndGame()) return;
        setTimeout(() => this.checkPlayable(), 500);
    }

    async enemyAI() {
        while(this.enemy.ap >= 2 && this.enemy.hand.length > 0) {
            const idx = Math.floor(Math.random() * this.enemy.hand.length);
            const card = this.enemy.hand.splice(idx, 1)[0];
            this.enemy.ap -= 2;

            this.log(`💀 적 <b>[${card.name}]</b> 사용!`);
            await this.executeCard(card, this.enemy, this.player);
            
            this.enemy.grave.push(card);
            await this.triggerGraveEffect(this.enemy, card);

            this.updateBattleUI();
            if(this.checkEndGame()) return;
            await sleep(1000);
        }
        this.log("적 턴 종료.");
        await sleep(1000);
        this.endTurn();
    }

    async dealDamage(target, amount, type, statusType = '', isMultiHit = false, isReflection = false) {
        if (this.globalStatus.blindness > 0) {
            this.log(` 🕶️ 실명 효과로 인해 피해 무효화!`); return;
        }

        let opponent = target === this.player ? this.enemy : this.player;
        let reflectDmg = 0;

        if (type === 'physical') {
            if (!isReflection && target.statuses.thorn_armor > 0) {
                reflectDmg = Math.floor(amount / 2);
                amount -= reflectDmg;
                this.log(` 🛡️ [가시갑옷] 물리피해 ${reflectDmg} 감소 및 반사!`);
            }

            if (target.statuses.patience_turns > 0) {
                target.statuses.patience_val += amount;
                this.log(` 🕸️ [인내] ${amount} 피해 누적! (현재: ${target.statuses.patience_val})`);
            } else {
                let finalDmg = Math.max(0, amount - target.defense);
                let blocked = amount - finalDmg;
                target.hp -= finalDmg;
                target.defense = Math.max(0, target.defense - amount);
                
                if (finalDmg > 0) {
                    this.log(` ⚔️ ${target.name}에게 ${finalDmg}의 물리피해!` + (blocked > 0 ? ` (방어도 ${blocked} 상쇄)` : ``));
                } else {
                    this.log(` 🛡️ 방어력에 막혀 피해를 주지 못했습니다! (방어도 ${blocked} 상쇄)`);
                }
                await this.playPhysicalFX(isMultiHit);
            }

            if (reflectDmg > 0 && !this.checkEndGame()) {
                await this.dealDamage(opponent, reflectDmg, 'physical', '', false, true);
            }

        } else if (type === 'status') {
            if (!isReflection && target.statuses.silent_night > 0) {
                reflectDmg = Math.floor(amount / 2);
                amount -= reflectDmg;
                this.log(` 🌙 [고요한 밤] 상태이상 피해 ${reflectDmg} 감소 및 반사!`);
            }

            target.hp -= amount;
            this.log(` 🩸 ${target.name}에게 ${amount}의 상태이상 피해!`);
            await this.playStatusFX(statusType);
            
            if (reflectDmg > 0 && !this.checkEndGame()) {
                await this.dealDamage(opponent, reflectDmg, 'status', statusType, false, true);
            }
        }
        
        this.updateBattleUI();
        await sleep(300); 
    }

    async executeCard(card, caster, target) {
        let isSpecialCard = false;

        if (card.name === "선견지명") {
            let stepIdx = caster.deck.findIndex(c => c.name === "스텝 밟기");
            if (stepIdx > -1) {
                let stepCard = caster.deck.splice(stepIdx, 1)[0];
                caster.hand.push(stepCard);
                this.log(` 👁️ 덱에서 [스텝 밟기]를 찾아 드로우했습니다.`);
            } else {
                this.log(` 👁️ 덱에 [스텝 밟기]가 없어 효과가 발동되지 않았습니다.`);
            }
            caster.ap += 4;
            this.log(` ⚡ AP 4 회복!`);
            isSpecialCard = true;
        
        } else if (card.name === "스텝 밟기") {
            await this.drawCard(caster, 2);
            caster.ap += 3;
            this.log(` 🃏 2장 드로우 & ⚡ AP 3 회복!`);
            isSpecialCard = true;
        } else if (card.name === "전술적 구르기" || card.name === "감각 개화" || card.name === "주변 맴돌기") {
            await this.drawCard(caster, 1);
            caster.ap += 3;
            this.log(` 🃏 1장 드로우 & ⚡ AP 3 회복!`);
            isSpecialCard = true;
        } else if (card.name === "토끼기사의 지혜") {
            this.log(` 🐇 사용됨. (데미지 0)`);
            isSpecialCard = true;
        } else if (card.name === "구사일생") {
            let totalDmg = 0;
            this.playerDeck.forEach(c => {
                if (c.tags.includes("공격")) {
                    let m = c.desc.match(/물리피해 (\d+)/);
                    if (m) {
                        let d = parseInt(m[1]);
                        if(c.desc.includes("15x2")) d = 30;
                        if(c.desc.includes("14x2")) d = 28;
                        if(c.desc.includes("16x2")) d = 32;
                        totalDmg += d;
                    }
                }
            });
            this.log(` 🆘 [구사일생] 공격 총 위력: ${totalDmg}!`);
            await this.dealDamage(target, totalDmg, 'physical');
            isSpecialCard = true;
        } else if (card.name === "절체절명") {
            this.log(` 🌟 [절체절명] 모든 상태이상을 결산합니다!`);
            let pDmg = 0; let eDmg = 0;
            ['poison', 'burn', 'curse'].forEach(k => { pDmg += this.calcSettlement(k, this.player.statuses[k]); });
            ['poison', 'burn', 'curse'].forEach(k => { eDmg += this.calcSettlement(k, this.enemy.statuses[k]); });
            
            if (pDmg > 0) await this.dealDamage(this.player, pDmg, 'physical');
            if (eDmg > 0) await this.dealDamage(this.enemy, eDmg, 'physical');
            
            if (this.player.hp <= 0 || this.enemy.hp <= 0) { isSpecialCard = true; return; }
            
            this.player.statuses = { poison: 0, burn: 0, curse: 0, patience_turns: 0, patience_val: 0, thorn_armor: 0, silent_night: 0, ultimatum: 0 };
            this.enemy.statuses = { poison: 0, burn: 0, curse: 0, patience_turns: 0, patience_val: 0, thorn_armor: 0, silent_night: 0, ultimatum: 0 };
            this.player.hp = this.player.maxHp; this.enemy.hp = this.enemy.maxHp;
            this.log(` 🌟 양측 체력이 100% 회복되었습니다.`);
            isSpecialCard = true;
            
        } else if (card.name === "중독") {
            target.statuses.poison += 3; this.log(` ☠️ 중독 스택 3 부여!`); isSpecialCard = true;
        } else if (card.name === "화상") {
            target.statuses.burn += 4; this.log(` 🔥 화상 스택 4 부여!`); isSpecialCard = true;
        } else if (card.name === "저주") {
            target.statuses.curse += 7; this.log(` 🔮 저주 스택 7 부여!`); isSpecialCard = true;
        } else if (card.name === "기사의 신조") {
            let active = Object.keys(caster.statuses).filter(k => ['poison', 'burn', 'curse'].includes(k) && caster.statuses[k] > 0);
            if (active.length > 0) {
                let toRemove = active[Math.floor(Math.random() * active.length)]; 
                caster.statuses[toRemove] = 0; 
                this.log(` ✨ 무작위 상태이상 정화!`);
            }
            isSpecialCard = true;
        } else if (card.name === "이행") {
            let active = Object.keys(target.statuses).filter(k => ['poison', 'burn', 'curse'].includes(k) && target.statuses[k] > 0);
            if (active.length > 0) {
                let toRemove = active[Math.floor(Math.random() * active.length)];
                let dmg = this.calcSettlement(toRemove, target.statuses[toRemove]);
                target.statuses[toRemove] = 0;
                this.log(` ⚡ [이행] 무작위 상태이상 폭발!`);
                await this.dealDamage(target, dmg, 'physical');
            }
            isSpecialCard = true;
        } else if (card.name === "결산") {
            let active = Object.keys(target.statuses).filter(k => ['poison', 'burn', 'curse'].includes(k) && target.statuses[k] > 0);
            let totalDmg = 0;
            for (let k of active) { 
                totalDmg += this.calcSettlement(k, target.statuses[k]); 
                target.statuses[k] = 0; 
            }
            if (totalDmg > 0) {
                this.log(` 💥 [결산] 모든 상태이상 폭발!`);
                await this.dealDamage(target, totalDmg, 'physical');
            }
            isSpecialCard = true;
        } else if (card.name === "거미줄을 딛고") {
            caster.statuses.patience_turns = 4; this.log(` 🕸️ 4턴간 [인내] 상태 돌입.`); isSpecialCard = true;
        } else if (card.name === "부채계약") {
            this.globalStatus.debt_contract = 2; this.log(` 📜 [부채계약] 체결.`); isSpecialCard = true;
        } else if (card.name === "실명") {
            this.globalStatus.blindness = 2; this.log(` 🕶️ [실명] 발동.`); isSpecialCard = true;
        } else if (card.name === "가시갑옷") {
            caster.statuses.thorn_armor += 3; this.log(` 🛡️ [가시갑옷] 3턴간 물리피해 50% 반사!`); isSpecialCard = true;
        } else if (card.name === "고요한 밤") {
            caster.statuses.silent_night += 3; this.log(` 🌙 [고요한 밤] 3턴간 상태이상 피해 50% 반사!`); isSpecialCard = true;
        } else if (card.name === "깨달음") {
            let pool = CARD_DB.filter(c => !c.tags.includes("엘리트") && c.tags.includes("공격") && !this.playerDeck.some(pd => pd.id === c.id));
            if (pool.length > 0) {
                let picked = pool[Math.floor(Math.random() * pool.length)];
                this.log(` 💡 [깨달음] 발동! 랜덤 공격 카드 [${picked.name}] 시전!`);
                await this.executeCard(picked, caster, target);
            } else { this.log(` 💡 [깨달음] 시전할 수 있는 카드가 없습니다.`); }
            isSpecialCard = true;
        } else if (card.name === "호기심") {
            let pool = CARD_DB.filter(c => !c.tags.includes("엘리트") && c.tags.includes("유틸리티") && !this.playerDeck.some(pd => pd.id === c.id));
            if (pool.length > 0) {
                let picked = pool[Math.floor(Math.random() * pool.length)];
                this.log(` 💡 [호기심] 발동! 랜덤 유틸 카드 [${picked.name}] 시전!`);
                await this.executeCard(picked, caster, target);
            } else { this.log(` 💡 [호기심] 시전할 수 있는 카드가 없습니다.`); }
            isSpecialCard = true;
        } else if (card.name === "성급한 결정") {
            let pool = CARD_DB.filter(c => c.name !== "성급한 결정"); // 무한 루프 방지
            if (pool.length > 0) {
                let picked = pool[Math.floor(Math.random() * pool.length)];
                this.log(` 💡 [성급한 결정] 발동! 랜덤 카드 [${picked.name}] 시전!`);
                await this.executeCard(picked, caster, target);
            }
            isSpecialCard = true;
        } else if (card.name === "만류귀종") {
            target.statuses.ultimatum = (target.statuses.ultimatum || 0) + 1;
            this.log(` ⏳ [만류귀종] ${target.name}에게 최후통첩 1 부여!`);
            isSpecialCard = true;
        }

        if (!isSpecialCard) {
            let dmgMatch = card.desc.match(/물리피해 (\d+)/);
            if(dmgMatch) {
                let dmg = parseInt(dmgMatch[1]);
                let isMulti = false;
                if(card.desc.includes("15x2")) { dmg = 30; isMulti = true; }
                if(card.desc.includes("14x2")) { dmg = 28; isMulti = true; }
                if(card.desc.includes("16x2")) { dmg = 32; isMulti = true; }
                await this.dealDamage(target, dmg, 'physical', '', isMulti);
            }
            
            let drawMatch = card.desc.match(/(\d+)장 드로우/);
            if (drawMatch) { 
                await this.drawCard(caster, parseInt(drawMatch[1]));
                this.log(` 🃏 ${drawMatch[1]}장 드로우!`);
            }
            let apMatch = card.desc.match(/AP (\d+) 회복/);
            if (apMatch) {
                caster.ap += parseInt(apMatch[1]);
                this.log(` ⚡ AP ${apMatch[1]} 회복!`);
            }
        }

        let defMatch = card.desc.match(/방어도 (\d+)/);
        if(defMatch) { caster.defense += parseInt(defMatch[1]); this.log(` 🛡️ 방어도 증가.`); }

        let healMatch = card.desc.match(/HP회복 (\d+)|HP (\d+) 회복/);
        if(healMatch) {
            let heal = parseInt(healMatch[1] || healMatch[2]);
            caster.hp = Math.min(caster.maxHp, caster.hp + heal);
            this.log(` 💚 HP 회복.`);
        }

        this.updateBattleUI();
        await sleep(300);
    }

    async processEndTurnStatuses(entity) {
        let tookDamage = false;
        let keepStack = this.globalStatus.debt_contract > 0; 

        if (entity.statuses.poison > 0) {
            this.log(`[상태이상] ☠️중독 발동!`);
            await this.dealDamage(entity, entity.statuses.poison * 8, 'status', 'poison');
            if (!keepStack) entity.statuses.poison--;
            tookDamage = true;
        }
        if (entity.statuses.burn > 0) {
            this.log(`[상태이상] 🔥화상 발동!`);
            await this.dealDamage(entity, entity.statuses.burn * 6, 'status', 'burn');
            if (!keepStack) entity.statuses.burn--;
            tookDamage = true;
        }
        if (entity.statuses.curse > 0) {
            this.log(`[상태이상] 🔮저주 발동!`);
            await this.dealDamage(entity, entity.statuses.curse * 3, 'status', 'curse');
            if (!keepStack) entity.statuses.curse--;
            tookDamage = true;
        }

        // 최후통첩(선고) 결산
        if (entity.statuses.ultimatum > 0) {
            this.log(`[상태이상] ⏳최후통첩(선고) 발동!`);
            let sentenceDmg = 0;
            CARD_DB.forEach(c => {
                if (c.tags.includes("공격") && !c.tags.includes("엘리트") && !c.tags.includes("버프") && !c.tags.includes("유틸리티")) {
                    let m = c.desc.match(/물리피해 (\d+)/);
                    if (m) {
                        let d = parseInt(m[1]);
                        if(c.desc.includes("15x2")) d = 30;
                        if(c.desc.includes("14x2")) d = 28;
                        if(c.desc.includes("16x2")) d = 32;
                        sentenceDmg += d;
                    }
                }
            });
            await this.dealDamage(entity, sentenceDmg, 'status', 'curse');
            if (!keepStack) entity.statuses.ultimatum--;
            tookDamage = true;
        }

        if (entity.statuses.patience_turns > 0) {
            if (!keepStack) entity.statuses.patience_turns--;
            if (entity.statuses.patience_turns <= 0) {
                if (entity.statuses.patience_val > 0) {
                    this.log(`[상태이상] 🕸️인내 결산!`);
                    await this.dealDamage(entity, entity.statuses.patience_val, 'status', 'patience');
                }
                entity.statuses.patience_val = 0;
                tookDamage = true;
            }
        }
        
        if (entity.statuses.thorn_armor > 0) {
            entity.statuses.thorn_armor--;
            if (entity.statuses.thorn_armor <= 0) this.log(`[버프 종료] 🛡️가시갑옷이 해제되었습니다.`);
        }
        if (entity.statuses.silent_night > 0) {
            entity.statuses.silent_night--;
            if (entity.statuses.silent_night <= 0) this.log(`[버프 종료] 🌙고요한 밤이 해제되었습니다.`);
        }

        if (tookDamage) await sleep(500);
    }

    async endTurn() {
        let currentEntity = this.turn === 'player' ? this.player : this.enemy;
        await this.processEndTurnStatuses(currentEntity);

        if(this.checkEndGame()) return;

        if (this.globalStatus.blindness > 0) this.globalStatus.blindness--;
        if (this.globalStatus.debt_contract > 0) this.globalStatus.debt_contract--;

        this.turn = this.turn === 'player' ? 'enemy' : 'player';
        this.runTurn();
    }

    checkEndGame() {
        if (this.player.hp <= 0 && this.enemy.hp <= 0) {
            this.log("<br><b style='color:#ff4d4d'>동시 사망! (플레이어 패배 판정)</b>");
            setTimeout(() => { document.getElementById('final-score').innerText = `격파한 적: ${this.score}명`; this.changeScreen('gameover'); }, 2000);
            return true;
        }
        if(this.enemy.hp <= 0) {
            this.log("<br><b style='color:#00ff00'>전투 승리!</b>");
            this.score++;
            this.lastEnemyData = { name: this.enemy.name, maxHp: this.enemy.maxHp }; // 인터미션용 저장
            setTimeout(() => this.startRewardPhase(), 1500);
            return true;
        }
        if(this.player.hp <= 0) {
            this.log("<br><b style='color:#ff4d4d'>전투 패배...</b>");
            setTimeout(() => { document.getElementById('final-score').innerText = `격파한 적: ${this.score}명`; this.changeScreen('gameover'); }, 2000);
            return true;
        }
        return false;
    }

    formatStatus(entity) {
        let res = '';
        if(entity.statuses.poison > 0) res += `<span style="color:#00ff00; margin-right:5px;">☠️${entity.statuses.poison}</span>`;
        if(entity.statuses.burn > 0) res += `<span style="color:#ff4d4d; margin-right:5px;">🔥${entity.statuses.burn}</span>`;
        if(entity.statuses.curse > 0) res += `<span style="color:#cc33ff; margin-right:5px;">🔮${entity.statuses.curse}</span>`;
        if(entity.statuses.ultimatum > 0) res += `<span style="color:#ffaa00; margin-right:5px;">⏳통첩(${entity.statuses.ultimatum})</span>`;
        if(entity.statuses.patience_turns > 0) res += `<span style="color:#aaaaaa; margin-right:5px;">🕸️누적${entity.statuses.patience_val}(${entity.statuses.patience_turns}턴)</span>`;
        if(entity.statuses.thorn_armor > 0) res += `<span style="color:#cccccc; margin-right:5px;">🛡️가시(${entity.statuses.thorn_armor}턴)</span>`;
        if(entity.statuses.silent_night > 0) res += `<span style="color:#99ccff; margin-right:5px;">🌙고요(${entity.statuses.silent_night}턴)</span>`;
        return res;
    }

    updateBattleUI() {
        let pStatus = this.formatStatus(this.player);
        let eStatus = this.formatStatus(this.enemy);

        let globalEffects = '';
        if (this.globalStatus.blindness > 0) globalEffects += `<span style="color:#fff; margin-right:10px;">🕶️실명(${this.globalStatus.blindness}턴)</span>`;
        if (this.globalStatus.debt_contract > 0) globalEffects += `<span style="color:#ffcc00; margin-right:10px;">📜부채계약(${this.globalStatus.debt_contract}턴)</span>`;

        document.getElementById('enemy-info').innerHTML = `<b>${this.enemy.name}</b><br>HP: ${this.enemy.hp} | 방어도: ${this.enemy.defense}<br>${eStatus}`;
        document.getElementById('player-info').innerHTML = `${globalEffects}<br>HP: ${this.player.hp} | AP: ${this.player.ap} | 방어: ${this.player.defense}<br>${pStatus}`;
        
        document.getElementById('btn-deck').innerHTML = `덱<br>(${this.player.deck.length})`;
        document.getElementById('btn-grave').innerHTML = `무덤<br>(${this.player.grave.length})`;

        const handBox = document.getElementById('hand-box');
        handBox.innerHTML = '';
        this.player.hand.forEach((card, idx) => {
            let tagClass = this.getTagClass(card.tags);
            let el = document.createElement('div');
            el.className = `card-mini ${tagClass}`;
            el.innerText = card.name;
            el.onclick = () => this.confirmPlayCard(card, idx);
            handBox.appendChild(el);
        });
    }

    triggerFX(className) {
        const oldFx = document.getElementById('fx-layer');
        const newFx = oldFx.cloneNode(true);
        newFx.className = `hit-effect ${className}`;
        oldFx.parentNode.replaceChild(newFx, oldFx);
    }

    playShakeOnly() {
        const c = document.getElementById('game-container');
        c.classList.remove('anim-shake', 'anim-shake-double'); 
        void c.offsetWidth; 
        c.classList.add('anim-shake');
    }

    async playPhysicalFX(isMultiHit) {
        const c = document.getElementById('game-container');
        c.classList.remove('anim-shake', 'anim-shake-double'); 
        void c.offsetWidth; 
        c.classList.add(isMultiHit ? 'anim-shake-double' : 'anim-shake');
        
        this.triggerFX('flash-white');
        await sleep(20);
    }

    async playStatusFX(type) {
        let colorClass = ''; 
        if(type === 'poison') colorClass = 'tint-green';
        else if(type === 'burn') colorClass = 'tint-red';
        else if(type === 'curse') colorClass = 'tint-purple';
        else if(type === 'patience') colorClass = 'tint-white';
        
        this.triggerFX(colorClass);
        await sleep(20);
    }

    // ========================================================================
    // 4. 모달 & 보상 시스템
    // ========================================================================
    getTagClass(tags) {
        if(!tags) return "";
        if(tags.includes("공격")) return "tag-atk";
        if(tags.includes("유틸리티")) return "tag-util";
        if(tags.includes("버프")) return "tag-buff";
        if(tags.includes("엘리트")) return "tag-elite";
        return "";
    }

    getBgClass(tags) {
        if(!tags) return "";
        if(tags.includes("공격")) return "bg-atk";
        if(tags.includes("유틸리티")) return "bg-util";
        if(tags.includes("버프")) return "bg-buff";
        if(tags.includes("엘리트")) return "bg-elite";
        return "";
    }

    showListModal(title, cards) {
        const modal = document.getElementById('modal-view');
        document.getElementById('view-title').innerText = title;
        const list = document.getElementById('view-list');
        list.innerHTML = '';
        
        cards.forEach(card => {
            let el = document.createElement('div');
            el.className = `card-mini ${this.getTagClass(card.tags)}`;
            el.innerText = card.name;
            list.appendChild(el);
        });
        modal.classList.add('active');
    }

    openDrawModalAsync(cards) {
        return new Promise(resolve => {
            const modal = document.getElementById('modal-draw');
            const list = document.getElementById('draw-list');
            list.innerHTML = '';
            
            cards.forEach(card => {
                let el = document.createElement('div');
                el.className = `card-detail ${this.getBgClass(card.tags)}`;
                el.innerHTML = `<div class="name">${card.name} <span style="font-size:0.7rem; font-weight:normal;">${card.tags.map(t=>'#'+t).join(' ')}</span></div><div class="desc">${card.desc}</div>`;
                
                el.onclick = () => {
                    modal.classList.remove('active');
                    resolve(card);
                };
                list.appendChild(el);
            });
            modal.classList.add('active');
        });
    }

    async startRewardPhase() {
        this.changeScreen('reward');
        const titleEl = document.getElementById('reward-title');
        const listEl = document.getElementById('reward-list');
        
        titleEl.innerText = "승리 보상: 덱에 추가할 카드를 선택하세요.";
        listEl.innerHTML = '';

        const rewardPool = CARD_DB.filter(c => c.category !== "기본" && c.category !== "적");
        let choices = [];
        for(let i=0; i<3; i++) choices.push(getCard(rewardPool[Math.floor(Math.random() * rewardPool.length)].name));

        const newCard = await new Promise(resolve => {
            choices.forEach(card => {
                let el = document.createElement('div');
                el.className = `card-detail ${this.getBgClass(card.tags)}`;
                el.innerHTML = `<div class="name">${card.name}</div><div class="desc">${card.desc}</div>`;
                el.onclick = () => resolve(card);
                listEl.appendChild(el);
            });
        });

        this.playerDeck.push(newCard); 

        titleEl.innerText = "덱 압축: 버릴 카드를 1장 선택하세요.";
        listEl.innerHTML = '';

        const removeIdx = await new Promise(resolve => {
            this.playerDeck.forEach((card, idx) => {
                let el = document.createElement('div');
                el.className = `card-detail ${this.getBgClass(card.tags)}`;
                el.innerHTML = `<div class="name">${card.name}</div><div class="desc">${card.desc}</div>`;
                el.onclick = () => resolve(idx);
                listEl.appendChild(el);
            });
        });

        this.playerDeck.splice(removeIdx, 1); 

        this.showIntermission(); // 보상 후 인터미션으로 이동
    }
}

window.onload = () => {
    window.game = new Game(); // const를 지우고 window.game으로 변경!
};
</script>
